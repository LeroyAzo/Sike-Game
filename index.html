<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gema Escape</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0a0a1a;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
  overflow: hidden;
}

#gameContainer {
  position: relative;
  width: 95vmin;
  max-width: 960px;
  aspect-ratio: 4 / 3;
  border: 2px solid rgba(0, 255, 255, 0.25);
  box-shadow: 0 0 40px rgba(0, 255, 255, 0.08), inset 0 0 40px rgba(0, 255, 255, 0.03);
  border-radius: 4px;
  background: #1a1a2e;
  opacity: 0;
  transition: opacity 0.6s ease;
}

#gameContainer.visible {
  opacity: 1;
}

#gameCanvas {
  display: block;
  width: 100%;
  height: 100%;
  background: #1a1a2e;
}

#vizCanvas {
  position: absolute;
  top: -100px;
  left: -100px;
  width: calc(100% + 200px);
  height: calc(100% + 200px);
  pointer-events: none;
  z-index: 3;
}

#hud {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-between;
  padding: 12px 20px;
  color: #fff;
  font-size: clamp(12px, 2vmin, 18px);
  text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
  pointer-events: none;
  z-index: 5;
  letter-spacing: 1px;
}

#hud span {
  opacity: 0.9;
}

.hud-label {
  color: rgba(255, 255, 255, 0.5);
  font-size: 0.75em;
  margin-right: 4px;
}

.hud-value {
  color: #fff;
  font-weight: bold;
}

.record-value {
  color: #ffd700;
}

#controlsDisplay {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) scale(1);
  transform-origin: center center;
  transition: left 0.4s ease, transform 0.4s ease, opacity 0.2s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  background: rgba(0, 0, 0, 0.88);
  border-radius: 8px;
  padding: 20px 30px;
  opacity: 0;
  pointer-events: none;
  z-index: 100;
}

#controlsDisplay.visible {
  opacity: 1;
  pointer-events: auto;
  border-radius: 20px;
  padding: 24px 34px;
}

#controlsDisplay.panel {
  left: calc((100vw - min(95vmin, 960px)) / 4);
  transform: translate(-50%, -50%) scale(0.85);
  background: none;
  border-radius: 0;
  padding: 0;
  pointer-events: none;
  opacity: 1;
}

#controlsDisplay.instant {
  transition: none !important;
}

#controlsDisplay.visible h2 {
  color: #ff0000;
  font-size: clamp(36px, 6vmin, 56px);
  margin-bottom: 16px;
  letter-spacing: 6px;
  text-shadow: 0 0 25px rgba(255, 0, 0, 0.6), 0 0 50px rgba(255, 0, 0, 0.3);
  animation: shake 0.25s linear infinite;
}

#controlsDisplay.panel h2,
#controlsDisplay.panel .kb-tier,
#controlsDisplay.panel .kb-center {
  display: none;
}

#controlsDisplay.panel .kb-panel-title {
  display: block;
}

.kb-panel-title {
  display: none;
  color: #ffd700;
  font-size: clamp(22px, 3.2vmin, 30px);
  letter-spacing: 8px;
  text-transform: uppercase;
  margin-bottom: 10px;
  white-space: nowrap;
  text-align: center;
  width: 100%;
  text-shadow: 0 0 20px rgba(255, 215, 0, 0.6), 0 0 40px rgba(255, 215, 0, 0.3);
  animation: titleGlitch 3s ease-in-out infinite;
}

@keyframes titleGlitch {
  0%, 90%, 100% { transform: skew(0deg); opacity: 1; }
  92% { transform: skew(-3deg); opacity: 0.9; text-shadow: 0 0 30px #0ff, 0 0 60px #ffd700; }
  94% { transform: skew(3deg); opacity: 0.85; text-shadow: 0 0 30px #f00, 0 0 60px #ffd700; }
  96% { transform: skew(-1deg); opacity: 0.95; }
  98% { transform: skew(0deg); opacity: 1; }
}

@keyframes shake {
  0%   { transform: translate(0, 0); }
  10%  { transform: translate(-5px, 3px); }
  20%  { transform: translate(5px, -3px); }
  30%  { transform: translate(-4px, -4px); }
  40%  { transform: translate(4px, 3px); }
  50%  { transform: translate(-3px, 5px); }
  60%  { transform: translate(5px, -4px); }
  70%  { transform: translate(-5px, 2px); }
  80%  { transform: translate(3px, -5px); }
  90%  { transform: translate(-4px, 4px); }
  100% { transform: translate(0, 0); }
}

#controlsDisplay.visible ~ #gameContainer {
  animation: screenShake 0.25s linear infinite;
}

@keyframes screenShake {
  0%   { transform: translate(0, 0) rotate(0deg); }
  20%  { transform: translate(5px, -3px) rotate(-0.5deg); }
  40%  { transform: translate(-4px, 4px) rotate(0.5deg); }
  60%  { transform: translate(3px, -4px) rotate(-0.4deg); }
  80%  { transform: translate(-5px, 2px) rotate(0.4deg); }
  100% { transform: translate(0, 0) rotate(0deg); }
}

.keyboard-layout {
  display: grid;
  grid-template-columns: repeat(3, auto);
  grid-template-rows: repeat(3, auto);
  gap: 8px;
  align-items: center;
  justify-items: center;
  animation: fadeInScale 0.3s ease;
}

@keyframes fadeInScale {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}

.keyboard-key {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: clamp(64px, 11vmin, 100px);
  height: clamp(64px, 11vmin, 100px);
  border: 2px solid rgba(255, 215, 0, 0.35);
  border-radius: 10px;
  background: rgba(255, 215, 0, 0.06);
  gap: 2px;
}

.kb-arrow {
  font-size: clamp(14px, 2.2vmin, 22px);
  color: rgba(255, 255, 255, 0.5);
  line-height: 1;
}

.kb-letter {
  font-size: clamp(22px, 3.8vmin, 34px);
  color: #ffd700;
  font-weight: bold;
  text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
  line-height: 1;
}

.kb-center {
  font-size: clamp(34px, 5.5vmin, 52px);
  line-height: 1;
  text-shadow: 0 0 25px rgba(255, 215, 0, 0.4);
  animation: diceSpin 2s ease-in-out infinite;
}

@keyframes diceSpin {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(10deg); }
  75% { transform: rotate(-10deg); }
}

.kb-tier {
  color: rgba(255, 215, 0, 0.5);
  font-size: clamp(11px, 1.6vmin, 14px);
  letter-spacing: 3px;
  margin-bottom: 10px;
  text-transform: uppercase;
}

.keyboard-key.active {
  border-color: rgba(255, 255, 255, 0.8);
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 0 25px rgba(255, 255, 255, 0.25);
}

.keyboard-key.active .kb-arrow {
  color: #fff;
}

.keyboard-key.active .kb-letter {
  color: #fff;
  text-shadow: 0 0 20px rgba(255, 255, 255, 0.7);
}

#mainMenu {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #1c1c1c;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
  z-index: 30;
  overflow: hidden;
  animation: menuBgPulse 6s ease-in-out infinite;
}

#mainMenu::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,0.5) 100%);
  pointer-events: none;
  z-index: 1;
}

@keyframes menuBgPulse {
  0%, 100% { background-color: #1c1c1c; }
  50% { background-color: #1f1919; }
}

#mainMenu.visible {
  opacity: 1;
  pointer-events: all;
}

#mainMenu > * {
  position: relative;
  z-index: 2;
}

#menuCanvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

#mainMenu h1 {
  color: #ff2222;
  font-size: clamp(52px, 9vmin, 88px);
  letter-spacing: 10px;
  text-shadow: 0 0 40px rgba(255, 34, 34, 0.5), 0 0 80px rgba(255, 34, 34, 0.3);
  margin-bottom: 40px;
  animation: menuPulse 2s ease-in-out infinite;
}

@keyframes menuPulse {
  0%, 100% { text-shadow: 0 0 40px rgba(255, 34, 34, 0.5), 0 0 80px rgba(255, 34, 34, 0.3); }
  50% { text-shadow: 0 0 60px rgba(255, 34, 34, 0.8), 0 0 120px rgba(255, 34, 34, 0.5); }
}

#menuRecord {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 32px;
}

.menuRecord-label {
  color: rgba(200, 200, 200, 0.45);
  font-size: clamp(11px, 1.5vmin, 14px);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.menuRecord-value {
  color: #ffd700;
  font-size: clamp(32px, 5vmin, 48px);
  font-weight: bold;
  text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
  margin-top: 4px;
}

#menuButtons {
  display: flex;
  flex-direction: column;
  gap: 16px;
  align-items: center;
}

#menuButtons button {
  background: #A8A8A8;
  color: #222;
  border: 3px solid rgba(180, 180, 180, 0.4);
  padding: 12px 40px;
  font-size: clamp(14px, 2vmin, 20px);
  font-family: 'Courier New', monospace;
  font-weight: bold;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all 0.2s ease;
  border-radius: 4px;
  min-width: 200px;
}

#menuButtons button:hover {
  background: rgba(255, 50, 50, 0.15);
  color: #fff;
  box-shadow: 0 0 25px rgba(255, 50, 50, 0.2);
  border-color: rgba(255, 50, 50, 0.5);
  transform: scale(1.05);
}

#menuButtons button:focus-visible {
  outline: 2px solid rgba(255, 50, 50, 0.7);
  outline-offset: 2px;
  background: rgba(255, 50, 50, 0.15);
  color: #fff;
}

#menuButtons button:active {
  transform: scale(0.95);
}

#playBtn {
  border-color: #cc2222 !important;
  border-width: 3px !important;
  color: #cc2222 !important;
}

#playBtn:hover {
  background: rgba(255, 34, 34, 0.15) !important;
  color: #fff !important;
  box-shadow: 0 0 30px rgba(255, 34, 34, 0.35) !important;
}

#playBtn:focus-visible {
  outline: 2px solid #ff2222 !important;
  outline-offset: 2px !important;
}

#resetScoreBtn {
  border-color: rgba(200, 200, 200, 0.2) !important;
  color: rgba(200, 200, 200, 0.5) !important;
}

#resetScoreBtn:hover {
  background: rgba(255, 50, 50, 0.1) !important;
  border-color: rgba(255, 50, 50, 0.6) !important;
  color: #ff4444 !important;
  box-shadow: 0 0 20px rgba(255, 50, 50, 0.2) !important;
}

#optionsPanel {
  display: none;
  flex-direction: column;
  align-items: center;
  animation: fadeInScale 0.2s ease;
}

#optionsPanel h2 {
  color: rgba(200, 200, 200, 0.5);
  font-size: clamp(14px, 2vmin, 18px);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 20px;
}

#optionsPanel button {
  background: transparent;
  border: 2px solid rgba(200, 200, 200, 0.25);
  color: #ddd;
  padding: 12px 40px;
  font-size: clamp(14px, 2vmin, 20px);
  font-family: 'Courier New', monospace;
  font-weight: bold;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all 0.2s ease;
  border-radius: 4px;
  min-width: 200px;
  margin-bottom: 10px;
}

#optionsPanel button:hover {
  background: rgba(255, 50, 50, 0.08);
  box-shadow: 0 0 25px rgba(255, 50, 50, 0.15);
  border-color: rgba(255, 50, 50, 0.4);
  transform: scale(1.05);
}

#optionsPanel button:focus-visible {
  outline: 2px solid rgba(255, 50, 50, 0.6);
  outline-offset: 2px;
  background: rgba(255, 50, 50, 0.08);
  border-color: rgba(255, 50, 50, 0.4);
  color: #ff4444;
}

#optionsPanel button:active {
  transform: scale(0.95);
}

#optionsBackBtn {
  border-color: rgba(200, 200, 200, 0.15) !important;
  color: rgba(200, 200, 200, 0.45) !important;
  font-size: clamp(11px, 1.6vmin, 14px) !important;
  padding: 8px 24px !important;
  min-width: 120px !important;
}

#optionsBackBtn:hover {
  border-color: rgba(255, 50, 50, 0.4) !important;
  color: #ff4444 !important;
  background: rgba(255, 50, 50, 0.05) !important;
  box-shadow: 0 0 15px rgba(255, 50, 50, 0.1) !important;
  transform: scale(1.03) !important;
}

#deathScreen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 12px;
  background: rgba(0, 0, 0, 0.92);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
  z-index: 20;
}

#deathScreen.visible {
  opacity: 1;
  pointer-events: all;
}

#deathScreen h1 {
  color: #ff4444;
  font-size: clamp(36px, 6vmin, 56px);
  letter-spacing: 6px;
  text-shadow: 0 0 30px rgba(255, 68, 68, 0.5);
  margin-bottom: 24px;
}

#deathStats {
  text-align: center;
  margin-bottom: 32px;
}

#deathStats p {
  color: #fff;
  font-size: clamp(16px, 2.5vmin, 24px);
  line-height: 1.8;
}

#deathStats .newRecord {
  color: #ffd700;
  font-size: clamp(18px, 3vmin, 28px);
  font-weight: bold;
  text-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
  margin-top: 8px;
  animation: shake 0.3s linear infinite;
}

.stat-label {
  color: rgba(255, 255, 255, 0.5);
}

#restartBtn {
  background: transparent;
  color: #00ffff;
  border: 2px solid #00ffff;
  padding: 12px 40px;
  font-size: clamp(14px, 2vmin, 20px);
  font-family: 'Courier New', monospace;
  font-weight: bold;
  letter-spacing: 3px;
  cursor: pointer;
  transition: all 0.2s ease;
  border-radius: 4px;
}

#restartBtn:hover {
  background: rgba(0, 255, 255, 0.15);
  box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
  transform: scale(1.05);
}

#restartBtn:focus-visible {
  outline: 2px solid #00ffff;
  outline-offset: 2px;
}

#restartBtn:active {
  transform: scale(0.95);
}

#menuBtn {
  background: transparent;
  color: rgba(255, 255, 255, 0.5);
  border: 1px solid rgba(255, 255, 255, 0.2);
  padding: 10px 30px;
  font-size: clamp(12px, 1.8vmin, 16px);
  font-family: 'Courier New', monospace;
  font-weight: bold;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s ease;
  border-radius: 4px;
}

#menuBtn:hover {
  background: rgba(255, 255, 255, 0.05);
  border-color: rgba(255, 255, 255, 0.4);
  color: #fff;
}

#menuBtn:focus-visible {
  outline: 2px solid rgba(255, 255, 255, 0.4);
  outline-offset: 2px;
}

#resetAnimOverlay {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  pointer-events: none;
  z-index: 200;
  opacity: 0;
  transition: opacity 0.8s;
}

#resetAnimOverlay.active {
  opacity: 1;
}

#resetAnimOverlay.blur {
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

#resetAnimNumber {
  font-weight: bold;
  color: #ffd700;
  text-shadow: 0 0 40px rgba(255, 215, 0, 0.6);
  display: flex;
  gap: 4px;
  transform: translateX(100vw);
  transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1),
              font-size 0.4s ease,
              opacity 0.3s ease;
  font-size: clamp(72px, 12vmin, 120px);
}

#resetAnimNumber.slide-in {
  transform: translateX(0);
}

#resetAnimNumber.big {
  font-size: clamp(120px, 22vmin, 220px);
}

@keyframes vibrate {
  0%   { transform: translateX(0) rotate(0deg); }
  15%  { transform: translateX(-6px) rotate(-2deg); }
  30%  { transform: translateX(5px) rotate(1.5deg); }
  45%  { transform: translateX(-5px) rotate(-1deg); }
  60%  { transform: translateX(6px) rotate(2deg); }
  75%  { transform: translateX(-4px) rotate(-1.5deg); }
  90%  { transform: translateX(4px) rotate(1deg); }
  100% { transform: translateX(0) rotate(0deg); }
}

#resetAnimNumber.vibrate {
  animation: vibrate 0.15s linear infinite;
}

#resetAnimNumber.fade-out {
  opacity: 0;
  transition: opacity 1.5s ease;
}

#customModal {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(0, 0, 0, 0.75);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 300;
}

#customModal.visible {
  opacity: 1;
  pointer-events: all;
}

#customModalBox {
  background: #1c1c1c;
  border: 2px solid rgba(200, 50, 50, 0.3);
  border-radius: 8px;
  padding: 32px 40px;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 0 40px rgba(200, 50, 50, 0.15);
}

#customModalMsg {
  color: #ddd;
  font-size: clamp(14px, 2vmin, 18px);
  margin-bottom: 24px;
  line-height: 1.6;
}

#customModalBtns {
  display: flex;
  gap: 16px;
  justify-content: center;
}

#customModalBtns button {
  padding: 10px 28px;
  font-size: clamp(12px, 1.6vmin, 16px);
  font-family: 'Courier New', monospace;
  font-weight: bold;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s ease;
  border-radius: 4px;
}

#modalConfirmBtn {
  background: transparent;
  color: #ff4444;
  border: 2px solid #ff4444;
}

#modalConfirmBtn:hover {
  background: rgba(255, 68, 68, 0.15);
  box-shadow: 0 0 20px rgba(255, 68, 68, 0.25);
  transform: scale(1.05);
}

#modalConfirmBtn:focus-visible {
  outline: 2px solid #ff4444;
  outline-offset: 2px;
}

#modalCancelBtn {
  background: transparent;
  color: rgba(200, 200, 200, 0.6);
  border: 2px solid rgba(200, 200, 200, 0.2);
}

#modalCancelBtn:hover {
  background: rgba(200, 200, 200, 0.05);
  border-color: rgba(200, 200, 200, 0.4);
  color: #fff;
  transform: scale(1.05);
}

#modalCancelBtn:focus-visible {
  outline: 2px solid rgba(200, 200, 200, 0.4);
  outline-offset: 2px;
}

#howToPlayPanel {
  display: none;
  flex-direction: column;
  align-items: center;
  animation: fadeInScale 0.2s ease;
  width: 100%;
  max-width: 500px;
}

#howToPlayPanel h2 {
  color: rgba(200, 200, 200, 0.5);
  font-size: clamp(14px, 2vmin, 18px);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

#htpCard {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  min-height: 300px;
}

#htpGraphic {
  width: 100%;
  height: 120px;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  margin-bottom: 16px;
  position: relative;
}

#htpContent {
  text-align: center;
  width: 100%;
}

#htpTitle {
  color: #ffd700;
  font-size: clamp(18px, 2.8vmin, 26px);
  letter-spacing: 4px;
  margin-bottom: 12px;
  text-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
}

#htpText {
  color: rgba(255, 255, 255, 0.8);
  font-size: clamp(13px, 1.8vmin, 16px);
  line-height: 1.7;
  padding: 0 10px;
}

#htpDots {
  display: flex;
  gap: 8px;
  margin: 16px 0;
}

.htp-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.2);
  cursor: pointer;
  transition: all 0.3s ease;
  border: none;
  padding: 0;
}

.htp-dot.active {
  background: #ffd700;
  box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
  width: 24px;
  border-radius: 4px;
}

#htpNav {
  display: flex;
  gap: 16px;
  margin-bottom: 12px;
}

#htpNav button {
  background: transparent;
  border: 2px solid rgba(200, 200, 200, 0.25);
  color: #ddd;
  padding: 10px 24px;
  font-size: clamp(11px, 1.6vmin, 14px);
  font-family: 'Courier New', monospace;
  font-weight: bold;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s ease;
  border-radius: 4px;
}

#htpNav button:hover {
  background: rgba(255, 50, 50, 0.08);
  border-color: rgba(255, 50, 50, 0.4);
  color: #ff4444;
  transform: scale(1.05);
}

#htpNav button:focus-visible {
  outline: 2px solid rgba(255, 50, 50, 0.6);
  outline-offset: 2px;
}

#htpBack {
  background: transparent;
  border: 2px solid rgba(200, 200, 200, 0.15);
  color: rgba(200, 200, 200, 0.45);
  padding: 8px 24px;
  font-size: clamp(11px, 1.6vmin, 14px);
  font-family: 'Courier New', monospace;
  font-weight: bold;

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const vizCanvas = document.getElementById('vizCanvas');
const vctx = vizCanvas.getContext('2d');

const W = 960;
const H = 720;
canvas.width = W;
canvas.height = H;
vizCanvas.width = W + 200;
vizCanvas.height = H + 200;

const KEY_POOL = 'QWERTYUIOPASDFGHJKLZXCVBNM';
const TIER_POOLS = [
  null,
  null,
  'RTFGVB',
  'RTYFGHVBN',
  'EWRTYFGHJCVBN',
  'QWERTASDFGZXCVB',
  KEY_POOL,
];
const TIER_NAMES = ['WASD', 'ARROWS', 'NEAR', 'MID', 'WIDE', 'VERY WIDE', 'ALL'];
const PLAYER_SPEED = 250;

var gemIntros = [1,2,3,4,5].map(function(i) { return new Audio('assets/audio/gem' + i + '.wav'); });
var lastIntro = -1;
var gemMain = new Audio('assets/audio/gem.mp3');
var volumes = { master: 1, intro: 1, sike: 1, music: 1 };
var hoverSound = new Audio('assets/audio/hover.wav');
var clickSound = new Audio('assets/audio/click.wav');
var vibrateSound = new Audio('assets/audio/vibrate.wav');
var desolveSound = new Audio('assets/audio/desolve.wav');
var deathSound = new Audio('assets/audio/death.wav');

var song = new Audio('assets/audio/dumbstep_fondo_3.wav');
song.loop = true;
var menuSong = new Audio('assets/audio/fondo_menu1.wav');
menuSong.loop = true;
var audioCtx = null;
var gainNode = null;
var shaperNode = null;
var analyserNode = null;
var freqArray = null;
var audioReady = false;

function initAudioSystem() {
  if (audioReady) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyserNode = audioCtx.createAnalyser();
  analyserNode.fftSize = 256;
  freqArray = new Uint8Array(analyserNode.frequencyBinCount);
  shaperNode = audioCtx.createWaveShaper();
  shaperNode.oversample = '2x';
  gainNode = audioCtx.createGain();
  gainNode.gain.value = volumes.master * volumes.music;
  analyserNode.connect(shaperNode);
  shaperNode.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  try {
    var src = audioCtx.createMediaElementSource(song);
    src.connect(analyserNode);
  } catch(e) {}
  audioReady = true;
}

function updateSongVolume() {
  if (gainNode) gainNode.gain.value = volumes.master * volumes.music;
  menuSong.volume = volumes.master * volumes.music;
}

function updateSongSaturation() {
  if (!audioReady || !state || !state.player) return;
  var p = state.player;
  var minDist = 99999;
  for (var i = 0; i < state.enemies.length; i++) {
    var d = dist(p, state.enemies[i]);
    if (d < minDist) minDist = d;
  }
  var t = Math.max(0, Math.min(1, 1 - (minDist - 30) / 120));
  var amount = t * 50;
  var curve = new Float32Array(256);
  for (var i = 0; i < 256; i++) {
    var x = (i / 256) * 2 - 1;
    curve[i] = ((1 + amount) * x) / (1 + amount * Math.abs(x));
  }
  if (shaperNode) shaperNode.curve = curve;
}

function startSong() {
  if (!audioReady) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (shaperNode) shaperNode.curve = null;
  updateSongVolume();
  song.pause();
  song.currentTime = 0;
  song.play().catch(function() {});
}

function stopSong() {
  song.pause();
  song.currentTime = 0;
}

function startMenuSong() {
  menuSong.volume = volumes.master * volumes.music;
  menuSong.currentTime = 0;
  menuSong.play().catch(function() {});
}

function stopMenuSong() {
  menuSong.pause();
  menuSong.currentTime = 0;
}

function playGemSound() {
  var idx;
  do { idx = Math.floor(Math.random() * gemIntros.length); } while (idx === lastIntro);
  lastIntro = idx;
  var intro = gemIntros[idx];
  intro.currentTime = 0;
  intro.volume = volumes.master * volumes.intro;
  gemMain.currentTime = 0;
  gemMain.volume = volumes.master * volumes.sike;

  intro.play().catch(function() {});

  intro.onended = function() {
    gemMain.play().catch(function() {});

    var d = gemMain.duration;
    if (d && d !== Infinity && d > 0.2) {
      setTimeout(function() {
        var steps = 10;
        var iv = setInterval(function() {
          gemMain.volume = Math.max(0, gemMain.volume - (1 / steps));
          if (gemMain.volume <= 0) clearInterval(iv);
        }, 15);
      }, (d - 0.15) * 1000);
    }
  };
}

function getControlTier(score) {
  if (score === 0) return 0;
  if (score === 1) return 1;
  if (score <= 3) return 2;
  if (score <= 5) return 3;
  if (score <= 8) return 4;
  if (score <= 12) return 5;
  return 6;
}

const state = {
  player: { x: W / 2, y: H / 2, size: 20 },
  enemies: [],
  gems: [],
  score: 0,
  time: 0,
  record: 0,
  keys: {},
  controlMapping: null,
  dead: false,
  running: false,
  lastTime: 0,
  controlTimeout: null,
  gemSpawnTimer: 0,
  particles: [],
  gooPuddles: [],
  exploding: false,
  explosionTimer: 0,
  danger: 0,
  shakeTimer: 0,
  shakeDuration: 0,
  shakeIntensity: 0,
};

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function generateControls(tier) {
  if (tier === 0) return { up: 'W', down: 'S', left: 'A', right: 'D' };
  if (tier === 1) return { up: 'ARROWUP', down: 'ARROWDOWN', left: 'ARROWLEFT', right: 'ARROWRIGHT' };
  const pool = TIER_POOLS[tier];
  const chars = shuffle([...pool]);
  return { up: chars[0], down: chars[1], left: chars[2], right: chars[3] };
}

function displayKey(key) {
  if (key === 'ARROWUP') return '↑';
  if (key === 'ARROWDOWN') return '↓';
  if (key === 'ARROWLEFT') return '←';
  if (key === 'ARROWRIGHT') return '→';
  return key;
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function randPos(pad) {
  return {
    x: pad + Math.random() * (W - 2 * pad),
    y: pad + Math.random() * (H - 2 * pad),
  };
}

function getDifficultyConfig(score) {
  var speed = 100, count = 1;
  if (score >= 3) speed = 130;
  if (score >= 5) { count = 2; speed = 130; }
  if (score >= 8) { count = 2; speed = 165; }
  if (score >= 10) { count = 3; speed = 165; }
  return { speed: speed, count: count };
}

function applyDifficulty() {
  var cfg = getDifficultyConfig(state.score);
  while (state.enemies.length < cfg.count) {
    var side = Math.floor(Math.random() * 4);
    var x, y;
    var p = 40;
    switch (side) {
      case 0: x = p + Math.random() * (W - 2 * p); y = p; break;
      case 1: x = W - p; y = p + Math.random() * (H - 2 * p); break;
      case 2: x = p + Math.random() * (W - 2 * p); y = H - p; break;
      case 3: x = p; y = p + Math.random() * (H - 2 * p); break;
    }
    state.enemies.push({ x: x, y: y, lastX: x, lastY: y, size: 22, speed: cfg.speed });
  }
  state.enemies.forEach(function(e) { e.speed = cfg.speed; });
}

function spawnGem() {
  var pos, attempts = 0, valid = false;
  do {
    pos = randPos(30);
    attempts++;
    valid = dist(pos, state.player) >= 150 &&
      state.enemies.every(function(e) { return dist(pos, e) >= 80; }) &&
      state.gems.every(function(g) { return dist(pos, g) >= 60; });
  } while (!valid && attempts < 80);
  if (!valid) return;
  state.gems.push({ x: pos.x, y: pos.y, size: 14, bob: Math.random() * Math.PI * 2 });
}

function keyboardHTML(mapping, tierName) {
  var up = displayKey(mapping.up);
  var down = displayKey(mapping.down);
  var left = displayKey(mapping.left);
  var right = displayKey(mapping.right);
  return '<div class="kb-tier">' + tierName + '</div><div class="kb-panel-title">controls</div><div class="keyboard-layout">' +
    '<div class="keyboard-key" data-dir="up" style="grid-row:1;grid-column:2"><span class="kb-arrow">↑</span><span class="kb-letter">' + up + '</span></div>' +
    '<div class="keyboard-key" data-dir="left" style="grid-row:2;grid-column:1"><span class="kb-arrow">←</span><span class="kb-letter">' + left + '</span></div>' +
    '<div class="kb-center" style="grid-row:2;grid-column:2">🎲</div>' +
    '<div class="keyboard-key" data-dir="right" style="grid-row:2;grid-column:3"><span class="kb-arrow">→</span><span class="kb-letter">' + right + '</span></div>' +
    '<div class="keyboard-key" data-dir="down" style="grid-row:3;grid-column:2"><span class="kb-arrow">↓</span><span class="kb-letter">' + down + '</span></div>' +
    '</div>';
}

var htpCards = [
  { title: 'OBJECTIVE', text: 'Collect golden gems while escaping from red enemies. Each gem randomly reassigns your movement keys — adapt or be caught!', graphic: 'objective' },
  { title: 'MOVEMENT', text: 'Use the keys shown on screen to move the cyan square. After each gem, a new set of keys appears. Press them to move Up, Down, Left, and Right.', graphic: 'movement' },
  { title: 'GEMS', text: 'Each gem increases your score and triggers a "SIKE" popup showing your new keys. Time slows down while you read them — use that moment to find the keys!', graphic: 'gems' },
  { title: 'ENEMY GOO', text: 'Enemies leave a sticky black trail with a red glow. Walking on the trail slows you down significantly. Avoid the goo to stay fast!', graphic: 'goo' },
  { title: 'DANGER', text: 'The closer an enemy gets, the more the screen pulses red and shakes to the beat. The music distorts as danger rises — a warning to move!', graphic: 'danger' },
  { title: 'KEY TIERS', text: 'Start with WASD, then arrows, then gradually larger key pools: 6 keys, 9, 13, 15, and finally all 26 letters. The chaos escalates with your score!', graphic: 'tiers' },
];
var htpIndex = 0;

function htpGraphic(type) {
  var html = '';
  switch (type) {
    case 'objective':
      html = '<div style="position:relative"><div class="htp-gfx-box" style="background:#00ffff;box-shadow:0 0 12px rgba(0,255,255,0.4)"></div><span class="htp-label">YOU</span></div>' +
        '<div style="position:relative"><div class="htp-gfx-diamond" style="background:#ffd700;box-shadow:0 0 12px rgba(255,215,0,0.4)"></div><span class="htp-label">GEM</span></div>' +
        '<div style="position:relative"><div class="htp-gfx-box" style="background:#0a0a0a;border:2px solid rgba(255,0,0,0.5);box-shadow:0 0 10px rgba(255,0,0,0.3)"></div><span class="htp-label">ENEMY</span></div>';
      break;
    case 'movement':
      html = '<div style="display:grid;grid-template-columns:repeat(3,36px);gap:4px">' +
        '<div></div><div class="htp-gfx-key">↑</div><div></div>' +
        '<div class="htp-gfx-key">←</div><div class="htp-gfx-key" style="background:rgba(255,215,0,0.15)">?</div><div class="htp-gfx-key">→</div>' +
        '<div></div><div class="htp-gfx-key">↓</div><div></div></div>';
      break;
    case 'gems':
      html = '<div style="position:relative"><div class="htp-gfx-diamond" style="background:#ffd700;width:50px;height:50px;box-shadow:0 0 20px rgba(255,215,0,0.5)"></div><span class="htp-label" style="bottom:-20px">GOLD</span></div>' +
        '<div style="font-size:28px;color:#ff0000;text-shadow:0 0 20px rgba(255,0,0,0.4);font-weight:bold;letter-spacing:4px">SIKE</div>' +
        '<div style="position:relative"><div class="htp-gfx-diamond" style="background:#ffd700;width:30px;height:30px;box-shadow:0 0 12px rgba(255,215,0,0.4)"></div><span class="htp-label" style="bottom:-20px">AGAIN</span></div>';
      break;
    case 'goo':
      html = '<div style="position:relative"><div class="htp-gfx-box" style="background:#0a0a0a;border:2px solid rgba(255,0,0,0.5)"></div><span class="htp-label">ENEMY</span></div>' +
        '<div style="width:60px;height:6px;border-radius:3px;background:linear-gradient(90deg,#000 30%,rgba(200,0,0,0.6) 100%);box-shadow:0 0 8px rgba(255,0,0,0.3)"></div>' +

      break;
    case 'danger':
      html = '<div style="width:100px;height:80px;position:relative;overflow:hidden;border-radius:4px;background:#111">' +
        '<div style="position:absolute;inset:0;background:radial-gradient(circle at 50% 50%, transparent 30%, rgba(200,0,0,0.5) 100%)"></div>' +
        '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;background:#00ffff;border-radius:2px;box-shadow:0 0 8px rgba(0,255,255,0.4)"></div>' +
        '<div style="position:absolute;top:45%;left:30%;width:12px;height:12px;background:red;border-radius:2px"></div>' +
        '</div>';
      break;
    case 'tiers':
      html = '<div style="display:flex;flex-direction:column;gap:4px;align-items:center">' +

function showPopup(mapping, tier, duration) {

  el.classList.add('instant');

    '<p><span class="stat-label">GEMS</span>  ' + state.score + '</p>' +

function resetGame() {
  document.getElementById('deathScreen').classList.remove('visible');
  document.getElementById('controlsDisplay').classList.remove('visible', 'panel', 'instant');

  state.player.x = W / 2;
  state.player.y = H / 2;
  state.enemies = [];
  state.gems = [];
  state.score = 0;
  state.time = 0;
  state.dead = false;
  state.running = true;
  state.keys = {};
  state.controlTimeout = null;
  state.gemSpawnTimer = 0;
  state.particles = [];
  state.gooPuddles = [];
  state.shakeTimer = 0;
  state.shakeDuration = 0;
  state.shakeIntensity = 0;
  state.exploding = false;
  state.explosionTimer = 0;
  state.controlMapping = generateControls(0);
  ctx.filter = 'none';

  applyDifficulty();
  for (var i = 0; i < 2; i++) spawnGem();
  updateHUD();

  showInitialControls(state.controlMapping, 0);

  state.lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

function update(dt) {
  if (state.exploding) {
    state.explosionTimer -= dt;
    for (var i = state.particles.length - 1; i >= 0; i--) {
      var p = state.particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 200 * dt;
      var damp = Math.pow(0.97, dt * 60);
      p.vx *= damp;
      p.vy *= damp;
      p.life -= p.decay * dt;
      p.rot += p.rotSpeed * dt;
      if (p.life <= 0) state.particles.splice(i, 1);
    }
    if (state.explosionTimer <= 0) {
      state.exploding = false;
      document.getElementById('deathScreen').classList.add('visible');
    }
    if (state.shakeTimer > 0) {
      state.shakeTimer -= dt;
      if (state.shakeTimer <= 0) state.shakeIntensity = 0;
    }
    return;
  }

  if (!state.running || state.dead) return;

  var cdEl = document.getElementById('controlsDisplay');
  var isVisible = cdEl.classList.contains('visible');
  var isPanel = cdEl.classList.contains('panel');
  if (isVisible) dt *= 0.25;

  if (isVisible || isPanel) {
    var m = state.controlMapping;
    var dirs = ['up', 'down', 'left', 'right'];
    for (var i = 0; i < dirs.length; i++) {
      var dir = dirs[i];
      var el = cdEl.querySelector('[data-dir="' + dir + '"]');
      if (el) el.classList.toggle('active', !!state.keys[m[dir]]);
    }
  }

  state.time += dt;

  var m = state.controlMapping;
  var dx = 0, dy = 0;
  if (state.keys[m.left]) dx -= 1;
  if (state.keys[m.right]) dx += 1;
  if (state.keys[m.up]) dy -= 1;
  if (state.keys[m.down]) dy += 1;
  if (dx !== 0 && dy !== 0) { var len = Math.SQRT2; dx /= len; dy /= len; }

  var p = state.player;
  var onGoo = false;
  for (var gi = 0; gi < state.gooPuddles.length; gi++) {
    var gg = state.gooPuddles[gi];
    var gdx = gg.x2 - gg.x1, gdy = gg.y2 - gg.y1;
    var len2 = gdx * gdx + gdy * gdy;
    if (len2 > 0) {
      var t = Math.max(0, Math.min(1, ((p.x - gg.x1) * gdx + (p.y - gg.y1) * gdy) / len2));
      var cx = gg.x1 + t * gdx, cy = gg.y1 + t * gdy;
      if (Math.hypot(p.x - cx, p.y - cy) < p.size + gg.size * gg.life) { onGoo = true; break; }
    }
  }
  var moveSpeed = PLAYER_SPEED * (onGoo ? 0.35 : 1);
  p.x += dx * moveSpeed * dt;
  p.y += dy * moveSpeed * dt;
  p.x = Math.max(p.size, Math.min(W - p.size, p.x));
  p.y = Math.max(p.size, Math.min(H - p.size, p.y));

  for (var i = 0; i < state.enemies.length; i++) {
    var e = state.enemies[i];
    var edx = p.x - e.x;
    var edy = p.y - e.y;
    var d = Math.hypot(edx, edy);
    if (d > 1) {
      e.x += (edx / d) * e.speed * dt;
      e.y += (edy / d) * e.speed * dt;
    }
    e.x = Math.max(e.size, Math.min(W - e.size, e.x));
    e.y = Math.max(e.size, Math.min(H - e.size, e.y));
    var trailDist = Math.hypot(e.x - e.lastX, e.y - e.lastY);
    if (trailDist > 6) {
      state.gooPuddles.push({
        x1: e.lastX, y1: e.lastY,
        x2: e.x, y2: e.y,
        size: e.size,
        life: 1,
        decay: 0.4 + Math.random() * 0.2,
      });
      e.lastX = e.x;
      e.lastY = e.y;
    }
  }

  for (var i = state.gooPuddles.length - 1; i >= 0; i--) {
    var goo = state.gooPuddles[i];
    goo.life -= goo.decay * dt;
    if (goo.life <= 0) state.gooPuddles.splice(i, 1);
  }

  for (var i = state.gems.length - 1; i >= 0; i--) {
    var g = state.gems[i];
    if (dist(p, g) < p.size + g.size) {
      state.gems.splice(i, 1);
      state.score++;
      playGemSound();
      state.keys = {};
      var tier = getControlTier(state.score);
      state.controlMapping = generateControls(tier);
      showControlPopup(state.controlMapping, tier);
      applyDifficulty();
      state.gemSpawnTimer = 0;
      for (var j = state.gems.length; j < 2; j++) spawnGem();
    }
  }

  state.gemSpawnTimer += dt;
  if (state.gems.length < 2 && state.gemSpawnTimer > 1.5) { spawnGem(); state.gemSpawnTimer = 0; }

  var closestDist = Infinity;
  for (var i = 0; i < state.enemies.length; i++) {
    var d2 = Math.hypot(p.x - state.enemies[i].x, p.y - state.enemies[i].y);
    if (d2 < closestDist) closestDist = d2;
  }
  state.danger = 1 - Math.min(1, Math.max(0, (closestDist - 30) / 170));
  updateSongSaturation();

  if (state.danger > 0.15 && state.shakeTimer <= 0) {
    var beatPulse = Math.pow(Math.sin(state.time * Math.PI * 2 * 1.8), 16);
    if (beatPulse > 0.9) {
      state.shakeTimer = 0.1;
      state.shakeDuration = 0.1;
      state.shakeIntensity = 4;
    }
  }
  if (state.shakeTimer > 0) {
    state.shakeTimer -= dt;
    if (state.shakeTimer <= 0) state.shakeIntensity = 0;
  }

  for (var i = 0; i < state.enemies.length; i++) {
    if (dist(p, state.enemies[i]) < p.size + state.enemies[i].size) { showDeathScreen(); return; }
  }

  updateHUD();
}

function drawGoo() {
  for (var i = 0; i < state.gooPuddles.length; i++) {
    var goo = state.gooPuddles[i];
    var alpha = goo.life * 0.5;
    var w = goo.size * goo.life;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 8 * goo.life;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = w;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(goo.x1, goo.y1); ctx.lineTo(goo.x2, goo.y2); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(200, 0, 0, ' + (0.3 * goo.life) + ')';
    ctx.lineWidth = w * 0.3;
    ctx.beginPath(); ctx.moveTo(goo.x1, goo.y1); ctx.lineTo(goo.x2, goo.y2); ctx.stroke();
    ctx.restore();
  }
}

function drawGrid() {
  ctx.strokeStyle = 'rgba(255, 255, 255, 0.04)';
  ctx.lineWidth = 1;
  var step = 50;
  for (var x = 0; x <= W; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (var y = 0; y <= H; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawGems(time) {
  for (var i = 0; i < state.gems.length; i++) {
    var g = state.gems[i];
    var bob = Math.sin(time * 3 + g.bob) * 3;
    var gy = g.y + bob;
    ctx.save();
    ctx.shadowColor = '#ffd700'; ctx.shadowBlur = 18; ctx.fillStyle = '#ffd700';
    ctx.beginPath(); ctx.moveTo(g.x, gy - g.size); ctx.lineTo(g.x + g.size, gy); ctx.lineTo(g.x, gy + g.size); ctx.lineTo(g.x - g.size, gy); ctx.closePath(); ctx.fill();
    ctx.restore();
    ctx.fillStyle = 'rgba(255, 255, 200, 0.4)';
    ctx.beginPath(); ctx.moveTo(g.x, gy - g.size * 0.5); ctx.lineTo(g.x + g.size * 0.5, gy); ctx.lineTo(g.x, gy + g.size * 0.5); ctx.lineTo(g.x - g.size * 0.5, gy); ctx.closePath(); ctx.fill();
  }
}

function drawPlayer() {
  if (state.exploding || state.dead) return;
  var p = state.player;
  ctx.save(); ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 25; ctx.fillStyle = '#00ffff';
  ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size); ctx.restore();
  ctx.fillStyle = 'rgba(200, 255, 255, 0.5)';
  ctx.fillRect(p.x - p.size / 3, p.y - p.size / 3, p.size * 0.66, p.size * 0.66);
}

function drawEnemies(time) {
  for (var i = 0; i < state.enemies.length; i++) {
    var e = state.enemies[i];
    var hs = e.size, x = e.x - hs, y = e.y - hs, w = hs * 2;
    ctx.fillStyle = '#0a0a0a'; ctx.fillRect(x, y, w, w);
    var pulse = 0.7 + 0.3 * Math.sin(time * 4);
    ctx.save();
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 15 + 8 * pulse;
    ctx.strokeStyle = 'rgba(255,' + (40+30*pulse) + ',' + (40+30*pulse) + ',' + (0.7+0.3*pulse) + ')';
    ctx.lineWidth = 2; ctx.strokeRect(x, y, w, w); ctx.restore();
    ctx.shadowColor = '#ff0000'; ctx.shadowBlur = 4 + 4 * pulse;
    ctx.strokeStyle = 'rgb(' + (180+75*pulse) + ',' + (30+20*pulse) + ',' + (30+20*pulse) + ')';
    ctx.lineWidth = 1.5;
    var cx = e.x, cy = e.y, r = hs * 0.55;
    ctx.beginPath(); ctx.moveTo(cx - r, cy); ctx.lineTo(cx + r, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx - r * 0.6, cy); ctx.lineTo(cx - r * 0.6, cy - r * 0.7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + r * 0.4, cy); ctx.lineTo(cx + r * 0.4, cy + r * 0.7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + r * 0.7, cy - r * 0.4); ctx.lineTo(cx + r * 0.7, cy - r * 0.7); ctx.lineTo(cx + r * 0.3, cy - r * 0.7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx - r * 0.3, cy + r * 0.3); ctx.lineTo(cx - r * 0.3, cy + r * 0.7); ctx.lineTo(cx + r * 0.2, cy + r * 0.7); ctx.stroke();
    ctx.shadowBlur = 6 + 6 * pulse;
    ctx.fillStyle = 'rgb(255,' + (50+40*pulse) + ',' + (50+40*pulse) + ')';
    var nodes = [[cx-r*0.6,cy-r*0.7],[cx+r*0.4,cy+r*0.7],[cx+r*0.3,cy-r*0.7],[cx+r*0.2,cy+r*0.7]];
    for (var n = 0; n < nodes.length; n++) { ctx.beginPath(); ctx.arc(nodes[n][0], nodes[n][1], 2.5, 0, Math.PI*2); ctx.fill(); }
    ctx.shadowBlur = 0;
  }
}

function spawnExplosion(x, y) {
  state.particles = [];
  var colors = ['#00ffff', '#00ccdd', '#33eeff', '#ffffff', '#006688', '#004466'];
  for (var i = 0; i < 50; i++) {
    var angle = Math.random() * Math.PI * 2;
    var speed = 80 + Math.random() * 220;
    state.particles.push({
      x: x + (Math.random() - 0.5) * state.player.size,
      y: y + (Math.random() - 0.5) * state.player.size,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 2 + Math.random() * 7,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1,
      decay: 0.4 + Math.random() * 0.6,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 10,
    });
  }
}

function drawParticles() {
  for (var i = 0; i < state.particles.length; i++) {
    var p = state.particles[i];
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    var s = p.size;
    ctx.fillRect(-s / 2, -s / 2, s, s);
    ctx.restore();
  }
}

function drawVisualizer() {
  if (!analyserNode) return;
  analyserNode.getByteFrequencyData(freqArray);
  vctx.clearRect(0, 0, W + 200, H + 200);

  var ox = 100, oy = 100;
  var gap = 2;
  var maxH = 100;
  var counts = { top: 40, right: 24, bottom: 40, left: 24 };
  var totalBins = freqArray.length;

  function barColor(val, idx, total) {
    var t = idx / total;
    var r = Math.round(0 + t * 50);
    var g = Math.round(200 + t * 55);
    var b = Math.round(255);
    var bright = 0.4 + 0.6 * (val / 255);
    return 'rgb(' + Math.round(r * bright) + ',' + Math.round(g * bright) + ',' + Math.round(b * bright) + ')';
  }

  function freqIdx(barIdx, barCount) {
    return Math.floor(barIdx * totalBins / barCount);
  }

  var bw = (W - gap * (counts.top + 1)) / counts.top;
  for (var j = 0; j < counts.top; j++) {
    var fi = freqIdx(j, counts.top);
    var val = Math.min(freqArray[fi] * 0.6, 255);
    var h = val / 255 * maxH;
    if (h < 1) h = 0;
    vctx.fillStyle = barColor(val, j, counts.top);
    vctx.fillRect(ox + gap + j * (bw + gap), oy - h, bw, h);
  }
  var bh = (H - gap * (counts.right + 1)) / counts.right;
  for (var j = 0; j < counts.right; j++) {
    var fi = freqIdx(j, counts.right);
    var val = Math.min(freqArray[fi] * 0.6, 255);
    var w = val / 255 * maxH;
    if (w < 1) w = 0;
    var y = oy + gap + j * (bh + gap);
    vctx.fillStyle = barColor(val, j, counts.right);
    vctx.fillRect(ox + W, y, w, bh);
  }
  var bw2 = (W - gap * (counts.bottom + 1)) / counts.bottom;
  for (var j = 0; j < counts.bottom; j++) {
    var fi = freqIdx(j, counts.bottom);
    var val = Math.min(freqArray[fi] * 0.6, 255);
    var h = val / 255 * maxH;
    if (h < 1) h = 0;
    vctx.fillStyle = barColor(val, j, counts.bottom);
    vctx.fillRect(ox + gap + j * (bw2 + gap), oy + H, bw2, h);
  }
  var bh2 = (H - gap * (counts.left + 1)) / counts.left;
  for (var j = 0; j < counts.left; j++) {
    var fi = freqIdx(j, counts.left);
    var val = Math.min(freqArray[fi] * 0.6, 255);
    var w = val / 255 * maxH;
    if (w < 1) w = 0;
    var y = oy + gap + j * (bh2 + gap);
    vctx.fillStyle = barColor(val, j, counts.left);
    vctx.fillRect(ox - w, y, w, bh2);
  }
}

function drawDangerVignette(danger, time) {
  var pulse = Math.pow(Math.sin(time * Math.PI * 2 * 1.8), 16);
  var alpha = danger * 0.35 * (0.5 + 0.5 * pulse);
  if (alpha <= 0) return;
  var grad = ctx.createRadialGradient(W / 2, H / 2, H * 0.15, W / 2, H / 2, H * 0.7);
  grad.addColorStop(0, 'rgba(255, 0, 0, 0)');
  grad.addColorStop(1, 'rgba(200, 0, 0, ' + alpha + ')');
  ctx.save();
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

function render(time) {
  if (state.exploding) {
    var progress = 1 - Math.max(0, state.explosionTimer / 1.5);
    ctx.filter = 'grayscale(' + Math.round(progress * 100) + '%)';
  }
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  if (state.shakeTimer > 0 && state.shakeIntensity > 0) {
    var decay = state.shakeDuration > 0 ? state.shakeTimer / state.shakeDuration : 0;
    var amp = state.shakeIntensity * decay * decay;
    ctx.translate((Math.random() - 0.5) * 2 * amp, (Math.random() - 0.5) * 2 * amp);
  }
  drawGoo(); drawGrid(); drawGems(time); drawEnemies(time); drawPlayer();
  if (state.exploding) drawParticles();
  ctx.restore();
  if (state.danger > 0 && !state.dead && !state.exploding) drawDangerVignette(state.danger, time);
  ctx.filter = 'none';
}

var menuParticles = [];
var menuAnimId = null;

function initMenuParticles() {
  var c = document.getElementById('menuCanvas');
  var rect = c.parentElement.getBoundingClientRect();
  c.width = rect.width;
  c.height = rect.height;
  var ctx = c.getContext('2d');
  menuParticles = [];
  for (var i = 0; i < 60; i++) {
    menuParticles.push({
      x: Math.random() * c.width,
      y: Math.random() * c.height,
      size: 1 + Math.random() * 2.5,
      speed: 4 + Math.random() * 10,
      drift: (Math.random() - 0.5) * 6,
      alpha: 0.1 + Math.random() * 0.4,
      phase: Math.random() * Math.PI * 2,
    });
  }
  return ctx;
}

function drawMenuParticles(ts) {
  var c = document.getElementById('menuCanvas');
  var ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);
  for (var i = 0; i < menuParticles.length; i++) {
    var p = menuParticles[i];
    p.y -= p.speed * 0.016;
    p.x += Math.sin(ts * 0.001 + p.phase) * p.drift * 0.016;
    if (p.y < -5) { p.y = c.height + 5; p.x = Math.random() * c.width; }
    var alpha = p.alpha * (0.5 + 0.5 * Math.sin(ts * 0.002 + p.phase));
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = i % 3 === 0 ? 'rgba(255,50,50,' + alpha + ')' : 'rgba(200,200,200,' + (alpha * 0.5) + ')';
    ctx.fill();
  }
  menuAnimId = requestAnimationFrame(drawMenuParticles);
}

function startMenuParticles() {
  var c = document.getElementById('menuCanvas');
  if (!c || !c.parentElement.offsetParent) return;
  stopMenuParticles();
  initMenuParticles();
  drawMenuParticles(performance.now());
}

function stopMenuParticles() {
  if (menuAnimId) { cancelAnimationFrame(menuAnimId); menuAnimId = null; }
}

function gameLoop(timestamp) {
  var dt = Math.min((timestamp - state.lastTime) / 1000, 0.05);
  state.lastTime = timestamp; update(dt); render(timestamp / 1000); drawVisualizer();
  if (state.running || state.exploding) requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var modal = document.getElementById('customModal');
    if (modal.classList.contains('visible')) {
      document.getElementById('modalCancelBtn').click();
      e.preventDefault();
      return;
    }
    var htpPanel = document.getElementById('howToPlayPanel');
    if (htpPanel.style.display === 'flex') {
      document.getElementById('htpBack').click();
      e.preventDefault();
      return;
    }
    var mainMenu = document.getElementById('mainMenu');
    if (mainMenu.classList.contains('visible')) {
      var soundPanel = document.getElementById('soundPanel');
      var optionsPanel = document.getElementById('optionsPanel');
      if (soundPanel.style.display === 'flex') {
        document.getElementById('soundBackBtn').click();
        e.preventDefault();
      } else if (optionsPanel.style.display === 'flex') {
        document.getElementById('optionsBackBtn').click();
        e.preventDefault();
      }
    }
    return;
  }
  if (e.key === 'Enter') {
    var mainMenu = document.getElementById('mainMenu');
    if (mainMenu.classList.contains('visible') && !state.running) {
      if (document.getElementById('howToPlayPanel').style.display !== 'flex' &&
          document.getElementById('optionsPanel').style.display !== 'flex' &&
          document.getElementById('soundPanel').style.display !== 'flex') {
        document.getElementById('playBtn').click();
        e.preventDefault();
        return;
      }
    }
  }
  if (e.key === 'Tab' && !state.running) {
    var mainMenu = document.getElementById('mainMenu');
    if (mainMenu.classList.contains('visible')) { e.preventDefault(); return; }
  }
  if ((e.key === 'ArrowLeft' || e.key === 'ArrowRight') && !state.running) {
    var htpPanel = document.getElementById('howToPlayPanel');
    if (htpPanel.style.display === 'flex') {
      e.preventDefault();
      if (e.key === 'ArrowRight') document.getElementById('htpNext').click();
      else document.getElementById('htpPrev').click();
      return;
    }
  }
  if ((e.key === 'ArrowUp' || e.key === 'ArrowDown') && !state.running) {
    var mainMenu = document.getElementById('mainMenu');
    if (mainMenu.classList.contains('visible')) {
      e.preventDefault();
      var container;
      if (document.getElementById('howToPlayPanel').style.display === 'flex') container = document.querySelectorAll('#htpNav button, #htpBack');
      else if (document.getElementById('soundPanel').style.display === 'flex') container = document.querySelectorAll('#soundPanel button');
      else if (document.getElementById('optionsPanel').style.display === 'flex') container = document.querySelectorAll('#optionsPanel button');
      else container = document.querySelectorAll('#menuButtons button');
      var visible = Array.prototype.filter.call(container, function(b) { return b.offsetParent !== null; });
      if (visible.length === 0) return;
      var focused = document.activeElement;
      var idx = visible.indexOf(focused);
      if (e.key === 'ArrowDown') idx = (idx + 1) % visible.length;
      else idx = (idx - 1 + visible.length) % visible.length;
      visible[idx].focus();
      return;
    }
  }
  state.keys[e.key.toUpperCase()] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].indexOf(e.key) >= 0) e.preventDefault();
});

document.addEventListener('keyup', function(e) {
  state.keys[e.key.toUpperCase()] = false;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].indexOf(e.key) >= 0) e.preventDefault();
});

  document.getElementById('menuRecord').style.display = 'flex';

function loadVolumes() {
  var keys = { master: 'volMaster', intro: 'volIntro', sike: 'volSike', music: 'volMusic' };
  for (var k in keys) {
    var saved = localStorage.getItem(keys[k]);
    if (saved !== null) {
      volumes[k] = parseInt(saved) / 100;
      var input = document.getElementById(keys[k]);
      input.value = saved;
      document.getElementById(keys[k] + 'Val').textContent = saved;
    }
  }
  updateSongVolume();
}

  document.getElementById('soundBtn').addEventListener('click', function() {
  document.getElementById('optionsPanel').style.display = 'none';
  document.getElementById('soundPanel').style.display = 'flex';
  setTimeout(function() { document.getElementById('soundBackBtn').focus(); }, 50);
});

document.getElementById('soundBackBtn').addEventListener('click', function() {
  document.getElementById('soundPanel').style.display = 'none';
  document.getElementById('optionsPanel').style.display = 'flex';
  setTimeout(function() { document.getElementById('soundBtn').focus(); }, 50);
});

function showModal(msg, onConfirm) {
  var modal = document.getElementById('customModal');
  var msgEl = document.getElementById('customModalMsg');
  var confirmBtn = document.getElementById('modalConfirmBtn');
  var cancelBtn = document.getElementById('modalCancelBtn');
  msgEl.textContent = msg;
  modal.classList.add('visible');
  function close() { modal.classList.remove('visible'); confirmBtn.onclick = null; cancelBtn.onclick = null; }
  confirmBtn.onclick = function() { close(); if (onConfirm) onConfirm(); };
  cancelBtn.onclick = close;
}

document.getElementById('resetScoreBtn').addEventListener('click', function() {
  if (state.record === 0) {
    showModal('Your best score is already 0.');
    return;
  }
  showModal('Are you sure you want to reset?', function() {
    var overlay = document.getElementById('resetAnimOverlay');
    var numEl = document.getElementById('resetAnimNumber');
    var score = state.record;

    numEl.innerHTML = String(score).split('').map(function(c) { return '<span>' + c + '</span>'; }).join('');
    overlay.classList.add('active', 'blur');
    void numEl.offsetWidth;
    numEl.classList.add('slide-in');

    setTimeout(function() { numEl.classList.add('big'); }, 1700);

    setTimeout(function() {
      numEl.classList.add('vibrate');
      vibrateSound.currentTime = 0;
      vibrateSound.volume = volumes.master * 0.3;
      vibrateSound.play().catch(function() {});
    }, 1900);

    setTimeout(function() {
      numEl.classList.remove('vibrate');
      vibrateSound.pause();
      vibrateSound.currentTime = 0;
      numEl.classList.remove('big');
      numEl.classList.add('fade-out');
      desolveSound.currentTime = 0;
      desolveSound.volume = volumes.master * 0.4;
      desolveSound.play().catch(function() {});
    }, 2400);

    setTimeout(function() {
      state.record = 0;
      localStorage.setItem('gemaRecord', '0');
      document.getElementById('menuRecordValue').textContent = '0';
      overlay.classList.remove('blur');
      overlay.classList.remove('active');
      numEl.classList.remove('slide-in', 'big', 'vibrate', 'fade-out');
      numEl.innerHTML = '';
    }, 3900);
  });
});

function setupSlider(id, volKey) {
  var input = document.getElementById(id);
  var valSpan = document.getElementById(id + 'Val');
  input.addEventListener('input', function() {
    var v = parseInt(input.value) / 100;
    volumes[volKey] = v;
    valSpan.textContent = input.value;
    localStorage.setItem(id, input.value);
    if (volKey === 'master' || volKey === 'music') updateSongVolume();
  });
}

setupSlider('volMaster', 'master');
setupSlider('volIntro', 'intro');
setupSlider('volSike', 'sike');
setupSlider('volMusic', 'music');

document.getElementById('menuBtn').addEventListener('click', function() {
  document.getElementById('deathScreen').classList.remove('visible');
  document.getElementById('optionsPanel').style.display = 'none';
  document.getElementById('soundPanel').style.display = 'none';
  document.getElementById('menuButtons').style.display = 'flex';
  document.getElementById('menuRecord').style.display = 'flex';
  document.getElementById('menuRecordValue').textContent = state.record;
  document.getElementById('gameContainer').classList.remove('visible');
  document.getElementById('mainMenu').classList.add('visible');
  state.running = false;

  stopSong();
  setTimeout(function() { document.getElementById('playBtn').focus(); startMenuParticles(); startMenuSong(); }, 100);
});

document.addEventListener('DOMContentLoaded', function() {
  state.record = parseInt(localStorage.getItem('gemaRecord')) || 0;
  loadVolumes();
  document.getElementById('menuRecordValue').textContent = state.record;
  document.getElementById('optionsPanel').style.display = 'none';
  document.getElementById('soundPanel').style.display = 'none';
  document.getElementById('menuButtons').style.display = 'flex';
  document.getElementById('menuRecord').style.display = 'flex';
  document.getElementById('gameContainer').classList.add('visible');
  document.getElementById('mainMenu').classList.add('visible');
  setTimeout(function() { document.getElementById('playBtn').focus(); startMenuParticles(); startMenuSong(); }, 100);
});
